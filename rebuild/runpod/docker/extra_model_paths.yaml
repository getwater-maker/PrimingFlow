# ComfyUI extra_model_paths.yaml
#
# 우리는 download-models.py 가 HF cache 의 파일을 ComfyUI 가 기대하는 경로에
# symlink 로 연결하기 때문에 별도 추가 경로가 없어도 동작합니다.
# 그래도 ComfyUI 가 default models/ 외에 다른 위치를 인식하도록 유지.
#
# 영상에서 강조한 "HF cache 의 스냅샷 경로를 동적으로 연결" 패턴은
# download-models.py 의 symlink 로직이 담당.

primingflow:
  base_path: /workspace/ComfyUI/

  checkpoints:    models/checkpoints/
  vae:            models/vae/
  unet:           models/unet/
  diffusion_models: models/diffusion_models/
  clip:           models/clip/
  clip_vision:    models/clip_vision/
  text_encoders:  models/text_encoders/
  loras:          models/loras/
  ipadapter:      models/ipadapter/
  controlnet:     models/controlnet/
  upscale_models: models/upscale_models/
  embeddings:     models/embeddings/

# HF cache 직접 참조 — 일부 노드(ComfyUI-Manager 등) 가 HF_HOME 을 직접 본다
hf_cache_passthrough:
  base_path: /workspace/hf-cache/
  custom_nodes: hub/
